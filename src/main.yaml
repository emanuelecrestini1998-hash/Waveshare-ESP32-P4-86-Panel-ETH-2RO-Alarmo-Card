#   clk: 
#     pin: GPIO50
#     mode: CLK_EXT_IN
#   phy_addr: 1
#   power_pin: GPIO51

esp32_hosted:
  active_high: true
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17

# update:
#   - platform: esp32_hosted
#     name: C6_update
#     path: network_adapter.bin
#     sha256: 1b1f6619689543c8a929db56db98a5663965bae9671a4a16436a90f4baa0f012

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - lvgl.label.update:
        id: wifi_status
        text_color: color_green
  on_disconnect:
    - lvgl.label.update:
        id: wifi_status
        text_color: color_steel_blue

display:
  - platform: mipi_dsi
    model: WAVESHARE-P4-86-PANEL
    reset_pin:
      number: 27
      inverted: false

i2c:
  sda: GPIO7
  scl: GPIO8
  scan: true
  frequency: 400kHz
  id: i2c_bus

touchscreen:
  platform: gt911
  id: touchscreen_
  # address: 0x14
  on_release:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming"
            - lvgl.resume:
            - lvgl.widget.redraw:
            - light.turn_on: display_backlight

output:
  - platform: ledc
    id: backlight_
    pin: GPIO26
    frequency: 100Hz
    inverted: true
    min_power: 0.0
    max_power: 0.8 # To prevent overheating due to excessive lighting
    
light:
  - platform: monochromatic
    name: "Backlight"
    output: backlight_
    id: display_backlight
    restore_mode: ALWAYS_ON
    on_turn_on:
      - if:
          condition: lvgl.is_paused
          then:
            - logger.log: "LVGL resuming by backlight on"
            - lvgl.resume:
            - lvgl.widget.redraw:
    on_turn_off:
      - if:
          condition:
            lambda: 'return true;'
          then:
            - logger.log: "Backlight off, pausing LVGL"
            - lvgl.pause:

api:
  encryption:
    key: !secret esp32p486_api_key

ota:
  - platform: esphome
    id: ota_state
    password: !secret esp32p486_ota_password

lvgl:
  id: lvgl_component
  buffer_size: 100%
  byte_order: little_endian

  on_idle:
    timeout: !lambda "return (id(display_timeout_backlight).state * 60 * 1000);"
    then:
      - if:
          condition:
            lambda: 'return id(display_timeout_backlight).state >= 0;'
          then:
            - logger.log: "LVGL is idle"
            - light.turn_off: display_backlight
            - lvgl.pause:
          else:
            - logger.log: "LVGL idle, but backlight is on"

http_request:
  verify_ssl: false