packages:
  sensors: !include common/pages/sensors.yaml
  loading: !include common/pages/loading.yaml
  settings: !include common/pages/settings.yaml
  alarm_panel: !include pages/alarm_panel/alarm_panel.yaml

image: !include common/images.yaml
font: !include common/fonts.yaml
color: !include common/colors.yaml
substitutions: !include common/substitutions.yaml

external_components:
  - source: 
      type: local
      path: components
    components: [i18n]

i18n:
  id: i18n_translations
  sources:
    - translations/en.yaml
    - translations/it.yaml
  default_locale: it

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  platformio_options:
    lib_deps:
      - "bblanchon/ArduinoJson@^7.2.0"
  includes:
    - <sstream>
    - <algorithm>
    - <ArduinoJson.h>
  on_boot:
    - priority: 400
      then:
        - lambda: |-
            id(i18n_translations).set_current_locale(id(current_language));
        - script.execute: update_loading_page
    - priority: -100
      then:
        - lvgl.roller.update:
            id: backlight_settings_sleep_time_roller
            selected_index: !lambda return id(display_timeout);

esp32:
  board: esp32-p4-evboard
  flash_size: 32Mb
  cpu_frequency: 360MHz
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: SIZE
      enable_idf_experimental_features: true
    sdkconfig_options:
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

logger:
  level: debug
  logs:
    lvgl: info
  hardware_uart: UART0

# debug:

psram:
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V

# ethernet:
#   type: IP101
